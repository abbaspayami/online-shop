server:
  port: 8080

spring:
  application:
    name: api-gateway

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:9090/realms/online-shop}

  cloud:
    gateway:
      httpclient:
        connect-timeout: ${GATEWAY_CONNECT_TIMEOUT:3000}   # ms — time to establish TCP connection
        response-timeout: ${GATEWAY_RESPONSE_TIMEOUT:10s}  # duration — time to receive response
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

cors:
  allowed-origins: ${ALLOWED_ORIGINS:http://localhost:3000,http://localhost:4200}

eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_ZONE:http://localhost:8761/eureka/}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
